<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentER — Sign in</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <h1>AgentER</h1>
    <p class="login-sub">Restricted — authorized ER staff only</p>
    <p id="error" class="login-error hidden">Sign-in failed. Please try again.</p>

    <a id="google-btn" class="google-btn hidden" href="/auth/google">
      <span class="g">G</span> Sign in with Google
    </a>
    <p id="oauth-note" class="login-note hidden">Google sign-in not configured — use the form below.</p>

    <div id="divider" class="divider hidden"><span>or</span></div>

    <form class="login-form" method="post" action="/login">
      <label>Username<input name="username" autocomplete="username" /></label>
      <label>Password<input name="password" type="password" autocomplete="current-password" /></label>
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.has("error")) document.getElementById("error").classList.remove("hidden");
    if (params.get("error") === "oauth_unconfigured") {
      document.getElementById("oauth-note").classList.remove("hidden");
    }
    fetch("/auth/config")
      .then((r) => r.json())
      .then((c) => {
        if (c.google_enabled) {
          document.getElementById("google-btn").classList.remove("hidden");
          document.getElementById("divider").classList.remove("hidden");
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
